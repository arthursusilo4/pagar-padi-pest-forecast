events {
    worker_connections 1024;
}
 
http {
 
    # ── Rate limiting ──────────────────────────────────────────────────────────
    # 30 requests per minute per IP for prediction endpoint
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=30r/m;
    # 100 requests per minute per IP for general API
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
 
    # ── Upstream FastAPI ───────────────────────────────────────────────────────
    upstream fastapi {
        server api:8000;
        keepalive 32;
    }
 
    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
 
    # ── Main HTTPS server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;    # CHANGE THIS
 
        # SSL certificates (Let\'s Encrypt via Certbot)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
 
        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
 
        # ── Prediction endpoint (rate limited) ───────────────────────────────
        location ~ ^/api/locations/[0-9]+/predict {
            limit_req zone=predict_limit burst=10 nodelay;
            proxy_pass         http://fastapi;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }
 
        # ── General API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://fastapi;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
        }
 
        # ── API docs ──────────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }
 
        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://fastapi;
        }
    }
}